services:
  - type: web
    name: medai
    env: python
    region: oregon
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn -k gthread --workers 1 --threads 4 --timeout 120 --bind 0.0.0.0:$PORT MedAI:app
    envVars:
      - key: FLASK_ENV
        value: production
      - key: COHERE_API_KEY
        sync: false          # You will paste this manually in the Render dashboard
      - key: FLASK_SECRET_KEY
        generateValue: true  # Render auto-generates a secure random value
